<!DOCTYPE html>

<head>

    <title>MicMuteRs OSD</title>
    <link rel="stylesheet" href="styles.css" />

        body {
            margin: 0;
            overflow: hidden;
            background: transparent;

    <script src="osd.js"></script>

</html>
