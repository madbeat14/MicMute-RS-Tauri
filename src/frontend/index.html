<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MicMuteRs Settings</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="settings-page">
  <!-- Application Header: Contains title, current active/muted status, and a quick toggle button -->
  <header class="app-header">
    <div class="header-icon">🎤</div>
    <div class="header-info">
      <h1>MicMuteRs</h1>
      <div class="status-bar">
        <span class="status-badge" id="mute-status">Loading…</span>
        <span class="vu-bar-container"><span class="vu-bar" id="vu-bar"></span></span>
      </div>
    </div>
    <button class="btn-icon" id="btn-toggle-mute" title="Toggle Mute">🎤</button>
  </header>

  <!-- Tab Navigation — outside scroll area so it's always visible -->
  <nav class="tabs-nav">
    <button class="tab-btn active" id="btn-tab-devices">Devices</button>
    <button class="tab-btn" id="btn-tab-audio">Audio</button>
    <button class="tab-btn" id="btn-tab-hotkeys">Hotkeys</button>
    <button class="tab-btn" id="btn-tab-overlay">Overlay</button>
    <button class="tab-btn" id="btn-tab-osd">OSD</button>
    <button class="tab-btn" id="btn-tab-system">System &amp; Startup</button>
  </nav>

  <!-- Main Settings Content Area -->
  <main class="settings-content">

    <div id="tab-devices" class="tab-pane active">
      <!-- Audio Device Section: Select microphone to mute/unmute -->
      <section class="card" id="sec-device">
        <div class="card-header">
          <span>🎧 Audio Device</span>
        </div>
        <div class="card-body">
          <label class="field-label">Microphone</label>
          <select id="sel-device" class="select-input"></select>
          <button class="btn-secondary mt-8" id="btn-refresh-devices">⟳ Refresh</button>
        </div>
      </section>

      <!-- Sync Devices Section: Choose additional microphones to mirror the mute state -->
      <section class="card mt-12" id="sec-sync">
        <div class="card-header">
          <span>🔗 Sync Devices</span>
        </div>
        <div class="card-body">
          <p class="hint">These devices mute/unmute alongside the primary device.</p>
          <div id="sync-list" class="checkbox-list"></div>
        </div>
      </section>
    </div>

    <div id="tab-audio" class="tab-pane">
      <!-- Audio Feedback Section: Enable beep or custom WAV sounds on toggle -->
      <section class="card" id="sec-audio">
        <div class="card-header">
          <span>🔊 Audio Feedback</span>
        </div>
        <div class="card-body">
          <label class="toggle-row">
            <span>Enable Audio Feedback</span>
            <input type="checkbox" id="chk-beep" class="toggle-switch" />
          </label>
          <div class="radio-group mt-12">
            <label><input type="radio" name="audio-mode" value="beep" id="radio-beep" /> Beep</label>
            <label><input type="radio" name="audio-mode" value="custom" id="radio-custom" /> Custom WAV</label>
          </div>

          <!-- Custom WAV Controls -->
          <div id="audio-custom-controls" class="mt-16">
            <div class="audio-panel">
              <label class="field-label">Mute Sound</label>
              <div class="file-input-row">
                <input type="text" id="path-mute" class="text-input" readonly placeholder="No file selected" />
                <button class="btn-sm" id="btn-browse-mute">Browse</button>
                <button class="btn-sm" id="btn-preview-mute">Preview</button>
              </div>
              <label class="field-label mt-8">Volume: <span id="vol-mute-val">50</span>%</label>
              <input type="range" id="slider-vol-mute" min="0" max="100" class="slider" />
            </div>

            <div class="audio-panel mt-12">
              <label class="field-label">Unmute Sound</label>
              <div class="file-input-row">
                <input type="text" id="path-unmute" class="text-input" readonly placeholder="No file selected" />
                <button class="btn-sm" id="btn-browse-unmute">Browse</button>
                <button class="btn-sm" id="btn-preview-unmute">Preview</button>
              </div>
              <label class="field-label mt-8">Volume: <span id="vol-unmute-val">50</span>%</label>
              <input type="range" id="slider-vol-unmute" min="0" max="100" class="slider" />
            </div>
          </div>

          <!-- Beep Controls -->
          <div id="audio-beep-controls" class="mt-16">
            <div class="audio-panel">
              <label class="field-label">Mute Beep</label>
              <div class="grid-3 mt-4">
                <div>
                  <label class="hint">Freq (Hz)</label>
                  <input type="number" id="beep-mute-freq" min="100" max="10000" class="number-input" />
                </div>
                <div>
                  <label class="hint">Dur (ms)</label>
                  <input type="number" id="beep-mute-dur" min="10" max="2000" class="number-input" />
                </div>
                <div>
                  <label class="hint">Count</label>
                  <input type="number" id="beep-mute-count" min="1" max="10" class="number-input" />
                </div>
              </div>
              <button class="btn-secondary btn-full mt-8" id="btn-preview-beep-mute">Preview Mute Beep</button>
            </div>

            <div class="audio-panel mt-12">
              <label class="field-label">Unmute Beep</label>
              <div class="grid-3 mt-4">
                <div>
                  <label class="hint">Freq (Hz)</label>
                  <input type="number" id="beep-unmute-freq" min="100" max="10000" class="number-input" />
                </div>
                <div>
                  <label class="hint">Dur (ms)</label>
                  <input type="number" id="beep-unmute-dur" min="10" max="2000" class="number-input" />
                </div>
                <div>
                  <label class="hint">Count</label>
                  <input type="number" id="beep-unmute-count" min="1" max="10" class="number-input" />
                </div>
              </div>
              <button class="btn-secondary btn-full mt-8" id="btn-preview-beep-unmute">Preview Unmute Beep</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div id="tab-hotkeys" class="tab-pane">
      <!-- Hotkeys Section: Configure keyboard shortcuts to toggle mute -->
      <section class="card" id="sec-hotkeys">
        <div class="card-header">
          <span>⌨️ Hotkeys</span>
        </div>
        <div class="card-body">
          <div class="radio-group">
            <label><input type="radio" name="hk-mode" value="toggle" id="hk-mode-toggle" /> Single Toggle Key</label>
            <label><input type="radio" name="hk-mode" value="separate" id="hk-mode-sep" /> Separate Mute/Unmute
              Keys</label>
          </div>
          <div id="hotkey-rows" class="hotkey-rows mt-12"></div>
        </div>
      </section>
    </div>

    <div id="tab-overlay" class="tab-pane">
      <!-- Persistent Overlay Section: Settings for the floating microphone widget -->
      <section class="card" id="sec-overlay">
        <div class="card-header">
          <span>🪟 Persistent Overlay</span>
        </div>
        <div class="card-body">
          <label class="toggle-row">
            <span>Enable Overlay</span>
            <input type="checkbox" id="chk-overlay" class="toggle-switch" />
          </label>
          <div id="overlay-options" class="sub-options">
            <label class="toggle-row mt-8">
              <span>Show VU Meter Dot</span>
              <input type="checkbox" id="chk-overlay-vu" class="toggle-switch" />
            </label>
            <label class="toggle-row">
              <span>Lock Position</span>
              <input type="checkbox" id="chk-overlay-locked" class="toggle-switch" />
            </label>
            <label class="field-label mt-8">Position</label>
            <select id="sel-overlay-pos" class="select-input">
              <option>Custom</option>
              <option>Top-Left</option>
              <option>Top-Center</option>
              <option>Top-Right</option>
              <option>Center-Left</option>
              <option>Center</option>
              <option>Center-Right</option>
              <option>Bottom-Left</option>
              <option>Bottom-Center</option>
              <option>Bottom-Right</option>
            </select>
            <label class="field-label mt-8">Icon Theme</label>
            <select id="sel-overlay-theme" class="select-input">
              <option>Auto</option>
              <option>Dark</option>
              <option>Light</option>
            </select>
            <label class="field-label mt-8">Size: <span id="overlay-scale-val">48</span>px</label>
            <input type="range" id="slider-overlay-scale" min="16" max="256" class="slider" />
            <label class="field-label mt-8">Opacity: <span id="overlay-opacity-val">80</span>%</label>
            <input type="range" id="slider-overlay-opacity" min="10" max="100" class="slider" />
            <label class="field-label mt-8">VU Sensitivity: <span id="overlay-sens-val">5</span>%</label>
            <input type="range" id="slider-overlay-sens" min="1" max="50" class="slider" />
          </div>
        </div>
      </section>
    </div>

    <div id="tab-osd" class="tab-pane">
      <!-- OSD Section: Settings for the temporary popup notification shown on state change -->
      <section class="card" id="sec-osd">
        <div class="card-header">
          <span>📺 On-Screen Display (OSD)</span>
        </div>
        <div class="card-body">
          <label class="toggle-row">
            <span>Enable OSD</span>
            <input type="checkbox" id="chk-osd" class="toggle-switch" />
          </label>
          <div id="osd-options" class="sub-options">
            <label class="field-label mt-8">Duration: <span id="osd-dur-val">1500</span>ms</label>
            <input type="range" id="slider-osd-dur" min="500" max="5000" step="100" class="slider" />
            <label class="field-label mt-8">Size: <span id="osd-size-val">150</span>px</label>
            <input type="range" id="slider-osd-size" min="50" max="300" class="slider" />
            <label class="field-label mt-8">Opacity: <span id="osd-opacity-val">80</span>%</label>
            <input type="range" id="slider-osd-opacity" min="10" max="100" class="slider" />
            <label class="field-label mt-8">Position</label>
            <select id="sel-osd-pos" class="select-input">
              <option>Top</option>
              <option>Center</option>
              <option>Bottom</option>
            </select>
          </div>
        </div>
      </section>
    </div>

    <div id="tab-system" class="tab-pane">
      <!-- System & Startup Section: Boot and AFK idle settings -->
      <section class="card" id="sec-system">
        <div class="card-header">
          <span>⚙️ System &amp; Startup</span>
        </div>
        <div class="card-body">
          <label class="toggle-row">
            <span>Start MicMuteRs on Boot</span>
            <input type="checkbox" id="chk-startup" class="toggle-switch" />
          </label>
          <label class="toggle-row mt-8">
            <span>Enable AFK Auto-Mute</span>
            <input type="checkbox" id="chk-afk" class="toggle-switch" />
          </label>
          <div id="afk-timeout-row" class="sub-options">
            <label class="field-label mt-8">Timeout: <span id="afk-timeout-val">60</span>s</label>
            <input type="range" id="slider-afk-timeout" min="5" max="3600" class="slider" />
          </div>
          <div class="link-row mt-8">
            <a href="#" id="link-help">📖 GitHub</a>
          </div>
        </div>
      </section>
    </div>

  </main>

  <!-- Application Footer: Shows debug messages and the manual Save button -->
  <footer class="app-footer">
    <span class="debug-msg" id="debug-msg"></span>
    <button class="btn-primary" id="btn-save">Save Settings</button>
  </footer>

  <!-- Import application logic -->
  <script src="js/main.js"></script>
</body>

</html>
